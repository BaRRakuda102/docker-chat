version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chat:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://chatuser:chatpass@db:5432/chatdb
      # Для локальной разработки SSL не нужен
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data: